# Research Agent Configuration

# LLM Provider
provider: anthropic

# Anthropic model tiering
anthropic_orchestration_model: claude-haiku-4-5-20251001
anthropic_synthesis_model: claude-sonnet-4-6

# Ollama model tiering
ollama_orchestration_model: llama3.1
ollama_synthesis_model: llama3.1
ollama_base_url: http://localhost:11434

# Search provider
# Options: anthropic | tavily
search_provider: anthropic
# tavily_api_key: tvly-...   # or set TAVILY_API_KEY env var
# anthropic_search_model: claude-haiku-4-5-20251001

# Research behaviour
min_questions: 4
max_questions: 5
max_iterations: 5
# verifier_max_iterations: 4   # 1 search per claim (max 3) + 1 response
# Parallel research workers
# max_workers: 2 is safe for Ollama (serialises LLM requests internally)
# max_workers: 4+ is safe for Anthropic (separate API servers)
# Reduce to 1 to disable parallelism entirely
max_workers: 2

# Token limits
max_tokens_research: 2048
max_tokens_synthesis: 8192

# Retry behaviour
retry_max_attempts: 3
retry_base_delay: 1.0
retry_max_delay: 30.0

# Editor agent (optional — defaults to synthesis provider and model)
# editor_provider: anthropic   # defaults to synthesis provider
# anthropic_editor_model: claude-haiku-4-5-20251001
# ollama_editor_model: llama3.1

# Knowledge store
# knowledge_store: none   # none | kuzu
# knowledge_db_path: output/.knowledge/research_agent.db
# knowledge_staleness_threshold_days: 90

# Analyst agent
# analyst_qualify_threshold: 0.5
# analyst_strengthen_source_types: [forum]

# URL fetch (read_url tool)
# max_url_chars: 8000          # max chars returned per read_url call
# url_fetch_timeout_seconds: 10  # fetch timeout in seconds

# Custom source classification — add project-specific domains here.
# Trigger: domain misclassified in 3+ runs and LLM fallback unavailable
# or incorrect. Do not add speculatively.
# source_classification:
#   academic:
#     - mycustomjournal.org
#   government:
#     - specialagency.int
#   news:
#     - myindustrynews.com